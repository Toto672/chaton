<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TPS Monitor</title>
    <style>
      :root {
        --ce-bg: hsl(220 12% 96%);
        --ce-fg: hsl(222 12% 14%);
        --ce-muted: hsl(220 6% 44%);
        --ce-accent: hsl(220 74% 52%);
        --ce-success: hsl(142 76% 36%);
        --ce-warning: hsl(38 92% 50%);
        --ce-font: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      }
      
      @media (prefers-color-scheme: dark) {
        :root {
          --ce-bg: hsl(222 14% 12%);
          --ce-fg: hsl(210 20% 90%);
          --ce-muted: hsl(215 10% 55%);
        }
      }
      
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      
      html, body {
        height: 100%;
        overflow: hidden;
      }
      
      body {
        font-family: var(--ce-font);
        background: transparent;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      
      .tps-widget {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 4px;
        padding: 4px 8px;
        border-radius: 6px;
        background: transparent;
        transition: background 150ms ease;
        cursor: default;
        user-select: none;
      }
      
      .tps-widget:hover {
        background: color-mix(in srgb, var(--ce-fg) 8%, transparent);
      }
      
      .tps-value {
        font-size: 13px;
        font-weight: 600;
        font-variant-numeric: tabular-nums;
        color: var(--ce-fg);
        min-width: 28px;
        text-align: right;
      }
      
      .tps-value.streaming {
        color: var(--ce-accent);
      }
      
      .tps-value.high {
        color: var(--ce-success);
      }
      
      .tps-value.medium {
        color: var(--ce-warning);
      }
      
      .tps-unit {
        font-size: 11px;
        font-weight: 500;
        color: var(--ce-muted);
        text-transform: uppercase;
      }
      
      .tsp-dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: var(--ce-muted);
        flex-shrink: 0;
      }
      
      .tsp-dot.streaming {
        background: var(--ce-accent);
        animation: pulse 1s ease-in-out infinite;
      }
      
      @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.4; }
      }
      
      .tps-empty {
        font-size: 12px;
        color: var(--ce-muted);
      }
    </style>
  </head>
  <body>
    <div class="tps-widget" id="tpsWidget" title="Tokens per second (average for this conversation)">
      <span class="tsp-dot" id="tpsDot"></span>
      <span class="tps-value" id="tpsValue">-</span>
      <span class="tps-unit">t/s</span>
    </div>
    <script src="./widget.js"></script>
  </body>
</html>
