apiVersion: v1
kind: Secret
metadata:
  name: chatons-cloud-secrets
  namespace: chatons-cloud
type: Opaque
stringData:
  DATABASE_URL: "postgres://chatons:change-me@postgres.chatons-cloud.svc.cluster.local:5432/chatons"
  REDIS_URL: "redis://redis.chatons-cloud.svc.cluster.local:6379"
  CHATONS_INTERNAL_SERVICE_TOKEN: "replace-with-long-random-secret"
  OIDC_CLIENT_ID: "replace-me"
  OIDC_CLIENT_SECRET: "replace-me"
  OIDC_ISSUER_URL: "https://issuer.example.com"
  JWT_SIGNING_KEY: "replace-me"
