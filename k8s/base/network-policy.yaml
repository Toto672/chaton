apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: chatons-cloud-default
  namespace: chatons-cloud
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector: {}
  egress:
    - to:
        - podSelector: {}
    - to:
        - namespaceSelector: {}
