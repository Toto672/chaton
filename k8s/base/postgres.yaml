apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: chatons-cloud
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:17
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5432
              name: postgres
          env:
            - name: POSTGRES_DB
              value: chatons
            - name: POSTGRES_USER
              value: chatons
            - name: POSTGRES_PASSWORD
              value: change-me
          readinessProbe:
            tcpSocket:
              port: postgres
            periodSeconds: 5
          livenessProbe:
            tcpSocket:
              port: postgres
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: chatons-cloud
spec:
  selector:
    app: postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: postgres
