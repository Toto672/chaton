apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: cloud-api
  namespace: chatons-cloud
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: cloud-api
---
apiVersion: policy/v1
kind: PodDisruptionBudget
